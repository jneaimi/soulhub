<blockquote class="naseej-pullquote naseej-pullquote--{{ variant or 'rule-leading' }}" lang="ar" dir="rtl">
    <p class="naseej-pullquote__text">{{ input.text }}</p>
{%- if input.attribution %}
    <footer class="naseej-pullquote__attr">— {{ input.attribution }}</footer>
{%- endif %}
</blockquote>
